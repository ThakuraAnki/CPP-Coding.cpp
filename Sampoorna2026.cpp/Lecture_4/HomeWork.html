<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .navbar{
            background-color: rgb(78, 76, 76);
            color: aliceblue;
            padding: 30px;
            font-size: 40px;
            text-align: center;
            font-weight: 80px;

        }
        .container{
            background-color: white;
            height: 500px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        .card{
            background-color:white;
            height: 300px;
            width: 300px;
            border-radius: 10px;
            box-shadow: 3px 3px 55px rgb(62, 61, 61);
            text-align: center;
            padding: 10px;
            padding-top: 15px;
        }
        .card img{
            border-radius: 10px;
            height: 80%;
            width: 100%;
        }
        .card h2{
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        FlexBox Card Layout
    </div>
    <div class="container">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1660032109934-d456ca7acadc?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fHJ1c3NpYW4lMjBnaXJsfGVufDB8fDB8fHww" alt="A russian young girl">

        </div>
        <div class="card">
