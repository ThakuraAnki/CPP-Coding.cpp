<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .div-1{
            background-color: aqua;
            grid-column: 1/2;
            grid-row: 1/3;
            justify-content: center;
            align-items: center;
            

        }
        .div-2{
            background-color: rgb(96, 33, 179);
            grid-column: 2/4;
            grid-row: 1/4;
            justify-content: center;
            align-items: center;
        }
        .div-3{
            background-color: rgb(229, 23, 27);
            grid-column: 4/5;
            grid-row: 1/2;
            justify-content: center;
            align-items: center;
        }
        .div-4{
            background-color: rgb(17, 191, 69);
            grid-column: 4/5;
            grid-row: 2/5;
            justify-content: center;
            align-items: center;
            
        }
        .div-5{
            
        }
        .div-6{
            
        }
        .div{
            display: flex;
            justify-content: center;
            align-items: center;

        }
    </style>
    <style>
        .container{
            display: grid;
            height: 600px;
            width: 600px;
            margin-top: 100;
            margin: auto;
            grid-template-rows: repeat(4, 1fr);
            grid-template-columns: repeat(4, 1fr);
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="div div-1">I</div>   
    <div class="div div-2">II</div>   
    <div class="div div-3">III</div>   
    <div class="div div-4">IV</div>   
    <div class="div div-5">V</div>   
    <div class="div div-6">VI</div>   
    </div>
</body>
</html>
